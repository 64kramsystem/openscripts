name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bats:
    name: build_kernel (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bats-core/bats-action@4.0.0
        with:
          tests: build_kernel.bats

  minitest:
    name: kernel_version (minitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
      - run: ruby kernel_packages_maintenance/kernel_version_test.rb
